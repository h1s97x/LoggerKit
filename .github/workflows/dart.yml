name: Dart CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # 1. 格式检查 + 自动修复
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限才能自动提交
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Format code
        run: dart format .

      - name: Commit and push (if changes)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: dart format"
          file_pattern: "*.dart"
        continue-on-error: true  # 即使提交失败也继续

  # 2. 静态分析
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  # 3. 测试
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-dependency-path: pubspec.lock

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --reporter compact

  # 4. 代码质量分析 (pana)
  pana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Run pana
        run: |
          flutter pub global activate pana
          flutter pub global run pana

  # 5. Example 检查 (如果存在)
  example:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Check example
        run: |
          if [ -f "example/pubspec.yaml" ]; then
            cd example && flutter pub get && cd ..
            echo "Example verified"
          else
            echo "No example directory, skipping"
          fi
