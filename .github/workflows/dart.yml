name: Dart CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

# 权限最小化原则
permissions:
  contents: read
  pull-requests: write

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # 1. 格式检查
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Format check
        run: dart format --set-exit-if-changed .

  # 2. 静态分析
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  # 3. 测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-dependency-path: pubspec.lock

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --reporter compact

  # 4. 代码质量分析 (pana)
  pana:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Run pana
        run: |
          flutter pub global activate pana
          flutter pub global run pana --no-terminal --report-format=markdown

  # 5. Example 检查 (如果存在)
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Check example
        if: |
          file.exists('example/pubspec.yaml')
        run: |
          cd example && flutter pub get && cd ..
          echo "Example verified"

  # 6. 自动修复格式问题并创建 PR
  format-fix:
    needs: format
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Format code
        run: dart format -o=changeset .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'style: dart format fixes'
          branch: chore/dart-format
          commit-message: 'style: dart format fixes'
