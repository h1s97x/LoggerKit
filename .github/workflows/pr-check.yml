name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, edited]

jobs:
  # PR Title 规范检查 (Conventional Commits)
  title-check:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style

  # 确保 PR 有描述
  description-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ -z "$BODY" ] || [ "$BODY" = "**Description**" ]; then
            echo "PR description is empty. Please add a meaningful description."
            exit 1
          fi
          echo "PR description is present"

  # 检查 PR 大小 (避免超大 PR)
  size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Count changed files
        run: |
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files | jq length)
          echo "Changed files: $FILES"
          if [ "$FILES" -gt 50 ]; then
            echo "Warning: This PR has more than 50 files. Consider splitting it."
          fi
